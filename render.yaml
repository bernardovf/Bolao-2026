services:
  - type: web
    name: bolao-2026
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app_v2:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: bolao-2026-db
          property: connectionString

databases:
  - name: bolao-2026-db
    databaseName: bolao_2026
    user: bolao_user
    plan: free
